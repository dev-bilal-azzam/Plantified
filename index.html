<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO & Accessibility -->
    <title>Plantified - Breathe Life Into Your Workspace</title>
    <meta
      name="description"
      content="Discover low-maintenance desk plants to refresh your workspace. Plantified offers a curated selection of green friends, from succulents to air-purifying plants, delivered to your door."
    />
    <meta name="keywords" content="desk plants, office plants, low-maintenance plants, workspace greenery, indoor plants" />
    <meta name="author" content="Plantified" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://your-domain.com/" />
    <meta name="theme-color" content="#39BB4B" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://your-domain.com/" />
    <meta property="og:title" content="Plantified - Breathe Life Into Your Workspace" />
    <meta property="og:description" content="Breathe life back into your workspace with low-maintenance desk plants." />
    <meta property="og:image" content="https://your-domain.com/plant.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://your-domain.com/" />
    <meta property="twitter:title" content="Plantified - Breathe Life Into Your Workspace" />
    <meta property="twitter:description" content="Breathe life back into your workspace with low-maintenance desk plants." />
    <meta property="twitter:image" content="https://your-domain.com/plant.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- 
      Preload critical assets to improve Largest Contentful Paint (LCP).
      - Preload the main font file(s). For Google Fonts, the stylesheet link handles this, but for self-hosted fonts, you'd preload the woff2 file.
      - Preload the hero image, which is the largest element visible in the initial viewport.
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Tomorrow:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="preload" fetchpriority="high" as="image" href="/plant.png" type="image/png" />

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
